name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Install dependencies
        run: |
          cd frontend
          pnpm install
      - name: Build frontend
        run: |
          cd frontend
          vite build --mode production
      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-binaries:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64, "386"]
        exclude:
          - goos: darwin
            goarch: "386"
          - goos: windows
            goarch: arm64
        include:
          - goos: linux
            goarch: arm
            goarm: "6"
          - goos: linux
            goarch: arm
            goarm: "7"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          output_name="honest-ui-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goarch }}" == "arm" ]; then
            output_name="${output_name}v${{ matrix.goarm }}"
          fi
          if [ "${{ matrix.goos }}" == "windows" ]; then
            output_name="${output_name}.exe"
          fi
          go build -o "$output_name" -trimpath -ldflags "-s -w"
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: honest-ui-*

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
      - name: Generate release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## Honest-UI

          Just the panel for Hysteria2 — Modern, fast, and open-source management panel.

          ### Installation

          **Quick install (recommended):**
          ```bash
          bash <(curl -fsSL https://raw.githubusercontent.com/Mr-Javadian/honest-ui/main/install.sh)
          ```

          **Docker:**
          ```bash
          docker pull mr-javadian/honest-ui:latest
          ```

          ### Binaries
          Download the appropriate binary for your platform below.
          EOF
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Honest-UI ${{ github.ref_name }}
          body_path: release-notes.md
          files: honest-ui-*
          draft: false
          prerelease: false
